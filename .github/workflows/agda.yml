name: Agda

on:
  # Direct pushes only on the integration branches. Feature-branch
  # validation is fully covered by the pull_request trigger below —
  # gating WIP pushes to no-PR branches with a full multi-minute Agda
  # build was the dominant self-inflicted load on the shared estate
  # Actions concurrency pool, and also double-fired (push + PR) on PR
  # branches. No proof coverage is lost: PRs and post-merge main still
  # run the full suite.
  push:
    branches: [main, master]
  pull_request:

# Estate guardrail: cancel superseded runs so re-pushes / rebased PR
# updates don't pile up queued full-suite builds. Safe here — this
# workflow only typechecks (read-only, no publish or mutation).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  check:
    runs-on: ubuntu-latest
    # Bound the job so a hung typecheck/clone cannot occupy a runner for
    # the 6-hour default. Generous upper bound — the warm suite is a few
    # minutes; a cold stdlib+suite build is well under this.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Fast static gate (no Agda): enforce the EchoKernel funext-free
      # certificate and that every Echo*.agda is classified in
      # docs/echo-types/echo-kernel-note.adoc. Fails the run before the
      # multi-minute typecheck if the kernel cone or the note drifts.
      - name: Kernel funext-free certificate + classification guard
        run: sh scripts/kernel-guard.sh

      - name: Install Agda and standard library
        run: |
          sudo apt-get update
          sudo apt-get install -y agda git

      - name: Record & sanity-check toolchain
        run: |
          set -e
          ver="$(agda --version | head -n1)"
          echo "CI Agda: $ver"
          echo "Local/flake reproducible Agda is pinned via flake.nix;"
          echo "exact-version CI parity (CI-via-flake) is the tracked"
          echo "P1 follow-up — see docs/foundation.adoc / proof-debt"
          echo "ledger item 'CI Agda pin'. This step makes the version"
          echo "VISIBLE and minimally-asserted, not silently floating."
          case "$ver" in
            *"version 2."*) : ;;
            *) echo "::error::unexpected Agda: $ver"; exit 1 ;;
          esac

      - name: Foundation guardrail (--safe/--without-K, no pragmas/postulates)
        run: bash tools/check-guardrails.sh proofs/agda

      - name: Fetch Agda standard library (v2.3)
        id: stdlib
        run: |
          STDLIB_DIR="$HOME/agda-stdlib"
          git clone --depth 1 --branch v2.3 https://github.com/agda/agda-stdlib.git "$STDLIB_DIR"
          echo "stdlib_dir=$STDLIB_DIR" >> "$GITHUB_OUTPUT"

      - name: Fetch absolute-zero library (PINNED)
        id: absz
        env:
          # Pinned 2026-05-18 to the known-good revision the suite is
          # green against (foundation provenance audit). Bump
          # deliberately, never float: an unpinned dependency is an
          # unpinned trust boundary.
          ABSZ_REF: 3ff5cee7f3fd002378089cd02f0c90a3747b45f0
        run: |
          ABSZ_DIR="$HOME/absolute-zero"
          git clone https://github.com/hyperpolymath/absolute-zero.git "$ABSZ_DIR"
          git -C "$ABSZ_DIR" checkout --quiet "$ABSZ_REF"
          ACTUAL="$(git -C "$ABSZ_DIR" rev-parse HEAD)"
          if [ "$ACTUAL" != "$ABSZ_REF" ]; then
            echo "::error::absolute-zero pin mismatch: want $ABSZ_REF got $ACTUAL"
            exit 1
          fi
          echo "absz_commit=$ACTUAL" >> "$GITHUB_OUTPUT"
          echo "absz_dir=$ABSZ_DIR" >> "$GITHUB_OUTPUT"

      - name: Register libraries for Agda
        run: |
          mkdir -p "$HOME/.agda"

          STDLIB_LIB="$RUNNER_TEMP/standard-library.agda-lib"
          cat > "$STDLIB_LIB" <<EOF
          name: standard-library
          include: ${{ steps.stdlib.outputs.stdlib_dir }}/src
          EOF

          ABSZ_LIB="$RUNNER_TEMP/absolute-zero.agda-lib"
          cat > "$ABSZ_LIB" <<EOF
          name: absolute-zero
          include: ${{ steps.absz.outputs.absz_dir }}/proofs/agda
          EOF

          printf '%s\n%s\n' "$STDLIB_LIB" "$ABSZ_LIB" > "$HOME/.agda/libraries"
          printf '%s\n' "standard-library" > "$HOME/.agda/defaults"

      # Cache Agda interface (.agdai) files. A fresh runner otherwise
      # recompiles the entire stdlib subset + the whole proof development
      # from scratch every run (the multi-minute cold pass). Agda validates
      # each .agdai against its source, so a stale cache is always safe —
      # it just means more modules recompile. The key rotates on any proof
      # source change or absolute-zero bump; restore-keys give a warm
      # partial cache even when it does.
      - name: Cache Agda interface files
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/agda-stdlib/**/*.agdai
            ~/absolute-zero/**/*.agdai
            proofs/agda/**/*.agdai
          # Key reflects reality: stdlib v2.3 + the PINNED absz commit
          # + source hash. (Previously hard-coded a stale "agda2.6.3";
          # corrected 2026-05-18. The cold-check job below never uses
          # this cache, so a cache anomaly cannot mask a real break.)
          key: agdai-${{ runner.os }}-stdlib2.3-absz${{ steps.absz.outputs.absz_commit }}-${{ hashFiles('proofs/agda/**/*.agda') }}
          restore-keys: |
            agdai-${{ runner.os }}-stdlib2.3-absz${{ steps.absz.outputs.absz_commit }}-
            agdai-${{ runner.os }}-stdlib2.3-

      - name: Typecheck full suite
        run: agda -i proofs/agda proofs/agda/All.agda

      - name: Smoke-check headline theorems
        run: agda -i proofs/agda proofs/agda/Smoke.agda

      - name: Typecheck characteristic lane (Gate #2 audit modules)
        run: agda -i proofs/agda proofs/agda/characteristic/All.agda

      - name: Typecheck examples lane (Gate #3 canonical examples)
        run: agda -i proofs/agda proofs/agda/examples/All.agda

      # Cubical lane: the (epi, mono) truncation discharge. A --cubical
      # --safe island (zero postulates) that CONSTRUCTS ∥_∥ as a HIT —
      # it cannot be imported by the --safe --without-K All.agda, so it
      # is typechecked directly here. Its --without-K-profile shadow is
      # EchoImageFactorizationPropPostulated (proof-debt (a)/(c)).
      - name: Typecheck cubical lane (epi/mono truncation discharge)
        run: agda -i proofs/agda proofs/agda/EchoImageFactorizationPropCubical.agda

  cold-check:
    # Belt-and-braces: NO interface cache, --ignore-interfaces cold
    # build. A green here cannot be a stale-.agdai artefact (matters
    # given the documented WSL git-object-corruption risk). Runs in
    # parallel with `check`; both must pass.
    runs-on: ubuntu-latest
    # Cold (--ignore-interfaces) build is the slowest path; still well
    # under this bound. Caps a runaway/hung job below the 6-hour default.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda git

      - name: Foundation guardrail
        run: bash tools/check-guardrails.sh proofs/agda

      - name: Fetch pinned libraries
        id: libs
        env:
          ABSZ_REF: 3ff5cee7f3fd002378089cd02f0c90a3747b45f0
        run: |
          STDLIB_DIR="$HOME/agda-stdlib"
          git clone --depth 1 --branch v2.3 https://github.com/agda/agda-stdlib.git "$STDLIB_DIR"
          ABSZ_DIR="$HOME/absolute-zero"
          git clone https://github.com/hyperpolymath/absolute-zero.git "$ABSZ_DIR"
          git -C "$ABSZ_DIR" checkout --quiet "$ABSZ_REF"
          mkdir -p "$HOME/.agda"
          printf 'name: standard-library\ninclude: %s/src\n' "$STDLIB_DIR" > "$RUNNER_TEMP/sl.agda-lib"
          printf 'name: absolute-zero\ninclude: %s/proofs/agda\n' "$ABSZ_DIR" > "$RUNNER_TEMP/az.agda-lib"
          printf '%s\n%s\n' "$RUNNER_TEMP/sl.agda-lib" "$RUNNER_TEMP/az.agda-lib" > "$HOME/.agda/libraries"
          printf 'standard-library\n' > "$HOME/.agda/defaults"

      - name: Cold typecheck (--ignore-interfaces, no cache)
        run: |
          agda --ignore-interfaces -i proofs/agda proofs/agda/All.agda
          agda --ignore-interfaces -i proofs/agda proofs/agda/Smoke.agda
          agda --ignore-interfaces -i proofs/agda proofs/agda/characteristic/All.agda
          agda --ignore-interfaces -i proofs/agda proofs/agda/examples/All.agda
          agda --ignore-interfaces -i proofs/agda proofs/agda/EchoImageFactorizationPropCubical.agda
