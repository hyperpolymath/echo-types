# SPDX-License-Identifier: MPL-2.0
name: Scorecards supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '23 4 * * 1'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    # Caller-granted permissions per the scorecard-reusable contract
    # (its header documents: the caller MUST grant security-events:write
    # + id-token:write; contents:read lets it read the repo). Closes the
    # Hypatia `scorecard_wrapper_missing_job_permissions` finding.
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: hyperpolymath/standards/.github/workflows/scorecard-reusable.yml@d7c22711e830e1f383846472f6e9b99debdb201e
    timeout-minutes: 10
    secrets: inherit